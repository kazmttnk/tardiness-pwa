<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#667eea">
  <title>遅刻記録システム</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>朝の遅刻者記録システム</h1>
      <div class="gate-time">門限時刻: <span id="gateTime">8:20</span></div>
    </div>
    
    <div id="alertBox" class="hidden"></div>
    
    <div class="main-card">
      <div class="input-section">
        <label class="input-label">生徒証番号を入力してください</label>
        <div class="barcode-area">
          <input type="text" id="barcodeInput" class="barcode-input" placeholder="生徒証番号（6桁）" autocomplete="off" inputmode="numeric" autofocus maxlength="6">
          <button class="search-btn" id="searchBtn" onclick="searchStudent()">検索</button>
          <button class="camera-btn" id="cameraBtn" onclick="toggleCamera()">📷</button>
        </div>
        
        <!-- カメラプレビュー -->
        <div id="cameraPreview" class="camera-preview hidden">
          <video id="videoPreview" class="video-preview" playsinline></video>
          <div class="camera-controls">
            <button class="btn btn-secondary" onclick="stopCamera()">カメラを閉じる</button>
          </div>
          <div class="scan-status" id="scanStatus">バーコードをカメラに向けてください...</div>
        </div>
      </div>
      
      <div id="studentInfo" class="student-info">
        <div class="info-row"><span class="info-label">生徒証番号</span><span class="info-value" id="displayStudentId">-</span></div>
        <div class="info-row"><span class="info-label">氏名</span><span class="info-value" id="displayName">-</span></div>
        <div class="info-row"><span class="info-label">クラス</span><span class="info-value" id="displayClass">-</span></div>
        <div class="reason-section">
          <label class="input-label">遅刻理由</label>
          <div id="reasonGrid" class="reason-grid"></div>
          <textarea id="detailInput" class="detail-input" placeholder="詳細（任意）"></textarea>
        </div>
        <div class="checkbox-group">
          <label class="checkbox-label"><input type="checkbox" id="hasPhoneCall"> 電話連絡あり</label>
          <label class="checkbox-label"><input type="checkbox" id="hasStudentCard"> 生徒証あり</label>
        </div>
        <div class="action-buttons">
          <button class="btn btn-secondary" id="cancelBtn" onclick="resetForm()">キャンセル</button>
          <button class="btn btn-primary" id="saveBtn" onclick="saveRecord()">記録を保存</button>
        </div>
      </div>
    </div>
    
    <div class="records-card">
      <div class="records-header"><span>本日の記録</span><span class="record-count" id="recordCount">0件</span></div>
      <div id="recordsList" class="records-list"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    </div>
  </div>

  <!-- モーダルアラート -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalAlert()">
    <div class="modal-alert" onclick="event.stopPropagation()">
      <div class="modal-alert-icon">⚠️</div>
      <div class="modal-alert-title" id="modalTitle">入力エラー</div>
      <div class="modal-alert-message" id="modalMessage">メッセージ</div>
      <button class="modal-alert-button" onclick="closeModalAlert()">OK</button>
    </div>
  </div>

  <!-- ZXing.js -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script src="/config.js"></script>
  <script src="/app.js"></script>
  
  <script>
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.error('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>
